name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Create runtime config
        env:
          APPS_SCRIPT_WEB_APP_URL: ${{ secrets.APPS_SCRIPT_WEB_APP_URL }}
          PUBLIC_APP_BASE_URL: ${{ secrets.PUBLIC_APP_BASE_URL }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const [owner, repoName] = (process.env.GITHUB_REPOSITORY || '').split('/');
          const defaultBaseUrl =
            owner && repoName ? `https://${owner}.github.io/${repoName}/` : '';
          const config = {
            apiUrl: process.env.APPS_SCRIPT_WEB_APP_URL || '',
            appBaseUrl: process.env.PUBLIC_APP_BASE_URL || defaultBaseUrl
          };

          if (!config.apiUrl) {
            console.error('Missing required repository secret: APPS_SCRIPT_WEB_APP_URL');
            console.error('Set it to the Apps Script Web App URL without ?action=health.');
            process.exit(1);
          }

          fs.mkdirSync('frontend/public', { recursive: true });
          fs.writeFileSync(
            'frontend/public/config.json',
            `${JSON.stringify(config, null, 2)}\n`
          );
          console.log(`Wrote frontend/public/config.json for ${config.appBaseUrl}`);
          NODE

      - name: Build
        env:
          VITE_APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_WEB_APP_URL }}
          VITE_PUBLIC_APP_BASE_URL: ${{ secrets.PUBLIC_APP_BASE_URL }}
        working-directory: frontend
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
